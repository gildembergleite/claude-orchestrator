version: 2

project_name: zarc

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/zarc
    binary: zarc
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: zarc-tech
      name: homebrew-tools
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/zarc-tech/zarc-claude-orchestrator"
    description: "Claude Code + tmux session launcher"
    license: "MIT"
    install: |
      bin.install "zarc"
    test: |
      system "#{bin}/zarc", "--version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
